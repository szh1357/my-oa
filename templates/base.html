<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>团队OA系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }
    nav {
      background: #1a73e8; color: white; padding: 0 24px;
      display: flex; align-items: center; height: 56px; gap: 8px;
    }
    nav .brand { font-size: 18px; font-weight: bold; margin-right: auto; }
    nav a { color: rgba(255,255,255,0.85); text-decoration: none; padding: 8px 12px;
            border-radius: 6px; font-size: 14px; }
    nav a:hover { background: rgba(255,255,255,0.15); color: white; }
    .container { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .card { background: white; border-radius: 10px; padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 16px; }
    .card h2 { font-size: 16px; color: #555; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .btn { display: inline-block; padding: 8px 18px; border-radius: 6px; border: none;
           cursor: pointer; font-size: 14px; text-decoration: none; }
    .btn-primary { background: #1a73e8; color: white; }
    .btn-primary:hover { background: #1558b0; }
    .btn-success { background: #34a853; color: white; }
    .btn-success:hover { background: #2d8f47; }
    .btn-danger { background: #ea4335; color: white; }
    .btn-danger:hover { background: #c5221f; }
    .btn-sm { padding: 4px 12px; font-size: 13px; }
    .flash { padding: 10px 16px; border-radius: 6px; margin-bottom: 16px;
             background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f8f9fa; padding: 10px 12px; text-align: left; color: #666; font-weight: 500; }
    td { padding: 10px 12px; border-top: 1px solid #f0f0f0; }
    tr:hover td { background: #fafafa; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; }
    .badge-pending { background: #fff3e0; color: #e65100; }
    .badge-done { background: #e8f5e9; color: #2e7d32; }
    .badge-admin { background: #e3f2fd; color: #1565c0; }
    form label { display: block; margin-bottom: 4px; font-size: 14px; color: #555; }
    form input, form textarea, form select {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 14px; margin-bottom: 14px; font-family: inherit;
    }
    form input:focus, form textarea:focus, form select:focus {
      outline: none; border-color: #1a73e8;
    }
    form textarea { height: 100px; resize: vertical; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .stat-card { background: white; border-radius: 10px; padding: 20px;
                 box-shadow: 0 1px 4px rgba(0,0,0,0.1); text-align: center; }
    .stat-card .num { font-size: 32px; font-weight: bold; color: #1a73e8; }
    .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
    @media (max-width: 600px) { .grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
{% if current_user.is_authenticated %}
<nav>
  <span class="brand">📋 团队OA</span>
  <a href="{{ url_for('dashboard') }}">首页</a>
  <a href="{{ url_for('announcements') }}">公告</a>
  <a href="{{ url_for('tasks') }}">任务</a>
  <a href="{{ url_for('attendance') }}">考勤</a>
  {% if current_user.is_admin %}<a href="{{ url_for('users') }}">成员</a>{% endif %}
  <a href="{{ url_for('logout') }}">退出</a>
</nav>
{% endif %}
<div class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
