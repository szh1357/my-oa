{% extends 'base.html' %}
{% block content %}
<div style="max-width:600px;margin:0 auto;">
  <div class="card">
    <h2>发布公告</h2>
    <form method="post">
      <label>标题</label>
      <input type="text" name="title" required autofocus>
      <label>内容</label>
      <textarea name="content" required style="height:160px;"></textarea>
      <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">发布</button>
        <a href="{{ url_for('announcements') }}" class="btn" style="background:#eee;">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
